<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 减脂计划生成器</title>
    <!-- 引入 marked.js 渲染 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-color: #0f0f1a;
            --card-bg: #1a1a2e;
            --primary: #00e5ff;
            --primary-hover: #00b3cc;
            --text-main: #e2e2e2;
            --text-muted: #8e8e9f;
            --border: #2a2a40;
            --error: #ff4b4b;
            --highlight: #b388ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            padding: 2rem;
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            gap: 2rem;
        }

        /* 响应式：小屏幕上下布局 */
        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }

            body {
                padding: 1rem;
            }
        }

        .left-panel,
        .right-panel {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
        }

        .left-panel {
            flex: 1;
            max-width: 500px;
        }

        .right-panel {
            flex: 1.8;
            overflow-y: auto;
            max-height: calc(100vh - 4rem);
            position: relative;
        }

        @media (max-width: 900px) {
            .left-panel {
                max-width: 100%;
            }

            .right-panel {
                max-height: none;
            }
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 2rem;
            color: #fff;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h1::before {
            content: "";
            display: inline-block;
            width: 6px;
            height: 24px;
            background: var(--primary);
            border-radius: 4px;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-row {
            display: flex;
            gap: 1rem;
        }

        .form-row .form-group {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        input,
        select {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(0, 229, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
        }

        select option {
            background: var(--card-bg);
            color: #fff;
        }

        /* 精准信息折叠区域 */
        .collapsible {
            margin-top: 1.5rem;
            border: 1px dashed var(--border);
            border-radius: 10px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.1);
        }

        .collapsible-header {
            padding: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: background 0.3s ease;
        }

        .collapsible-header:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .collapsible-header .title {
            font-weight: 600;
            color: var(--highlight);
            font-size: 1rem;
        }

        .collapsible-header .hint {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .collapsible-content {
            padding: 0 1.2rem 1.2rem 1.2rem;
            display: none;
        }

        .collapsible.active .collapsible-content {
            display: block;
        }

        .arrow {
            transition: transform 0.3s;
            color: var(--text-muted);
        }

        .collapsible.active .arrow {
            transform: rotate(180deg);
        }

        button.submit-btn {
            width: 100%;
            padding: 1.1rem;
            margin-top: 2rem;
            background: var(--primary);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 229, 255, 0.3);
        }

        button.submit-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 229, 255, 0.4);
        }

        button.submit-btn:active {
            transform: scale(0.98);
        }

        button.submit-btn:disabled {
            background: #333;
            color: #777;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 报告区域空状态 */
        .report-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            text-align: center;
        }

        /* 加载状态 */
        .loading {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--primary);
            font-weight: 500;
            letter-spacing: 1px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(0, 229, 255, 0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1.5rem;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        #report-content {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Markdown 专业排版样式 */
        .markdown-body {
            font-size: 1.05rem;
            line-height: 1.8;
            color: #d1d1d1;
        }

        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3 {
            color: #fff;
            margin-top: 2rem;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .markdown-body h1 {
            font-size: 1.8rem;
            color: var(--primary);
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.8rem;
        }

        .markdown-body h2 {
            font-size: 1.4rem;
            border-left: 4px solid var(--highlight);
            padding-left: 10px;
        }

        .markdown-body p {
            margin-bottom: 1.2rem;
        }

        .markdown-body ul,
        .markdown-body ol {
            margin-bottom: 1.2rem;
            padding-left: 1.5rem;
        }

        .markdown-body li {
            margin-bottom: 0.4rem;
        }

        /* 突出数字，通过正则处理后添加此类 */
        .highlight-number {
            font-size: 1.25em;
            font-weight: 700;
            color: var(--primary);
            padding: 0 4px;
        }

        .markdown-body blockquote {
            border-left: 4px solid var(--border);
            padding-left: 1rem;
            color: var(--text-muted);
            margin-bottom: 1.2rem;
            background: rgba(255, 255, 255, 0.02);
            padding: 1rem;
            border-radius: 0 8px 8px 0;
        }

        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1.5rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            overflow: hidden;
        }

        .markdown-body th,
        .markdown-body td {
            border: 1px solid var(--border);
            padding: 1rem;
            text-align: left;
        }

        .markdown-body th {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-weight: 600;
        }

        .export-btns {
            display: none;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .export-btn {
            padding: 0.6rem 1.2rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .export-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .error-message {
            color: var(--error);
            margin-top: 1rem;
            text-align: center;
            display: none;
            padding: 1rem;
            background: rgba(255, 75, 75, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(255, 75, 75, 0.3);
        }

        @media print {

            .left-panel,
            .export-btns {
                display: none !important;
            }

            .right-panel {
                max-height: none;
                border: none;
                box-shadow: none;
            }

            body {
                background: white;
                padding: 0;
            }

            .markdown-body {
                color: #000;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- 左侧表单 -->
        <div class="left-panel">
            <h1>减脂计划生成器</h1>
            <form id="fatburn-form">
                <!-- 基础信息 -->
                <div class="form-row">
                    <div class="form-group">
                        <label>性别</label>
                        <select id="gender" required>
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>年龄 (岁)</label>
                        <input type="number" id="age" required min="10" max="100" placeholder="例: 25">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>身高 (cm)</label>
                        <input type="number" id="height" required min="100" max="250" placeholder="例: 170">
                    </div>
                    <div class="form-group">
                        <label>体重 (kg)</label>
                        <input type="number" id="weight" required min="30" max="200" step="0.1" placeholder="例: 65">
                    </div>
                </div>

                <div class="form-group">
                    <label>日常活动量</label>
                    <select id="activityLevel" required>
                        <option value="久坐">久坐 (办公室工作，极少运动)</option>
                        <option value="轻度活动">轻度活动 (每周1-3天轻度锻炼)</option>
                        <option value="中度活动" selected>中度活动 (每周3-5天中等强度锻炼)</option>
                        <option value="重度活动">重度活动 (每周6-7天高强度锻炼)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>减脂目标</label>
                    <select id="goal" required>
                        <option value="微减">微减 (轻松改善体型)</option>
                        <option value="标准" selected>标准 (健康稳步减脂)</option>
                        <option value="激进">激进 (快速见效，需较强毅力)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>运动场景</label>
                    <select id="scene" required>
                        <option value="家庭版">家庭版 (无器械或仅哑铃/弹力带)</option>
                        <option value="健身房版" selected>健身房版 (器械齐全)</option>
                    </select>
                </div>

                <!-- 精准信息（折叠） -->
                <div class="collapsible" id="precision-info">
                    <div class="collapsible-header" onclick="toggleCollapsible()">
                        <div>
                            <div class="title">精准身体数据 (选填)</div>
                            <div class="hint">有体脂秤或测量过的填写，计划更精准</div>
                        </div>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="collapsible-content">
                        <div class="form-row">
                            <div class="form-group">
                                <label>体脂率 (%)</label>
                                <input type="number" id="bodyFat" min="1" max="60" step="0.1" placeholder="例: 20">
                            </div>
                            <div class="form-group">
                                <label>肌肉量 (kg)</label>
                                <input type="number" id="muscleMass" min="10" max="100" step="0.1" placeholder="例: 30">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>内脏脂肪等级</label>
                                <input type="number" id="visceralFat" min="1" max="30" placeholder="例: 8">
                            </div>
                            <div class="form-group">
                                <label>基础代谢率 (kcal)</label>
                                <input type="number" id="bmr" min="800" max="4000" placeholder="例: 1500">
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">生成专属减脂计划</button>
                <div id="error-msg" class="error-message"></div>
            </form>
        </div>

        <!-- 右侧报告 -->
        <div class="right-panel">
            <div id="report-empty" class="report-empty">
                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="var(--border)" stroke-width="1"
                    stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1.5rem;">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                    <path d="M8 14h.01"></path>
                    <path d="M12 14h.01"></path>
                    <path d="M16 14h.01"></path>
                    <path d="M8 18h.01"></path>
                    <path d="M12 18h.01"></path>
                    <path d="M16 18h.01"></path>
                </svg>
                <h2>准备就绪</h2>
                <p style="margin-top: 0.5rem; color: var(--text-muted);">填写左侧身体数据，即可一键生成您的个性化 AI 减脂计划</p>
            </div>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>正在分析您的身体数据...</p>
            </div>

            <div id="export-btns" class="export-btns">
                <button class="export-btn" onclick="exportMD()">导出 Markdown</button>
                <button class="export-btn" onclick="exportPDF()">导出 PDF</button>
            </div>

            <div id="report-content" class="markdown-body"></div>
        </div>
    </div>

    <script>
        // 切换折叠面板
        function toggleCollapsible() {
            document.getElementById('precision-info').classList.toggle('active');
        }

        // 将一些关键数字用正则包裹，实现高亮效果
        function highlightNumbers(htmlStr) {
            // 匹配独立的数字、带单位的数字 (如 1500 kcal, 20%, 65kg 等)
            // 简单处理：将大于等于2位的数字或带有 %、kcal、kg、g、cm 的数字进行高亮
            return htmlStr.replace(/\b(\d+(\.\d+)?)\s*(kcal|kg|g|cm|%|千卡|大卡)\b/g, '<span class="highlight-number">$1$3</span>');
        }

        // 表单提交处理
        document.getElementById('fatburn-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const submitBtn = document.getElementById('submit-btn');
            const emptyState = document.getElementById('report-empty');
            const loadingState = document.getElementById('loading');
            const reportContent = document.getElementById('report-content');
            const errorMsg = document.getElementById('error-msg');

            // 收集必填数据
            const data = {
                gender: document.getElementById('gender').value,
                age: Number(document.getElementById('age').value),
                height: Number(document.getElementById('height').value),
                weight: Number(document.getElementById('weight').value),
                activityLevel: document.getElementById('activityLevel').value,
                goal: document.getElementById('goal').value,
                scene: document.getElementById('scene').value
            };

            // 收集选填数据 (仅当用户填写时加入)
            const bodyFat = document.getElementById('bodyFat').value;
            if (bodyFat) data.bodyFat = Number(bodyFat);

            const muscleMass = document.getElementById('muscleMass').value;
            if (muscleMass) data.muscleMass = Number(muscleMass);

            const visceralFat = document.getElementById('visceralFat').value;
            if (visceralFat) data.visceralFat = Number(visceralFat);

            const bmr = document.getElementById('bmr').value;
            if (bmr) data.bmr = Number(bmr);

            // UI 状态切换：加载中
            submitBtn.disabled = true;
            submitBtn.textContent = '分析计算中...';
            emptyState.style.display = 'none';
            reportContent.style.display = 'none';
            errorMsg.style.display = 'none';
            loadingState.style.display = 'flex';

            try {
                const response = await fetch('https://fatburn.bruceou.dpdns.org/api/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    throw new Error(`服务器响应错误 (${response.status})`);
                }

                const resData = await response.json();

                // 假设后端返回的数据格式包含 report 字段
                const markdownText = resData.report || "未能获取到计划内容，请检查服务器返回格式。";
                window._lastMarkdown = markdownText;

                // 使用 marked.js 将 Markdown 转为 HTML
                let rawHtml = marked.parse(markdownText);

                // 高亮数据
                rawHtml = highlightNumbers(rawHtml);

                reportContent.innerHTML = rawHtml;

                // UI 状态切换：显示报告
                loadingState.style.display = 'none';
                reportContent.style.display = 'block';

                document.getElementById('export-btns').style.display = 'flex';

                // 手机端自动平滑滚动到报告区域
                if (window.innerWidth <= 900) {
                    document.querySelector('.right-panel').scrollIntoView({ behavior: 'smooth' });
                }

            } catch (error) {
                console.error('Request failed:', error);
                loadingState.style.display = 'none';
                emptyState.style.display = 'none'; // 保持不显示准备就绪
                errorMsg.style.display = 'block';
                errorMsg.textContent = '请求失败：' + error.message;
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '重新生成计划';
            }
        });
        function exportMD() {
            const md = window._lastMarkdown;
            if (!md) return;
            const blob = new Blob([md], { type: 'text/markdown' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '减脂计划.md';
            a.click();
        }

        function exportPDF() {
            window.print();
        }
    </script>

</body>

</html>
